name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: riskguard-deploy
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile backend modules
        run: python -m compileall app ml_service main.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to Ubuntu server
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/riskguard_deploy_key
          chmod 600 ~/.ssh/riskguard_deploy_key

      - name: Trust server host
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          test -n "$SERVER_HOST"
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Pull and restart containers
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/riskguard' }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || 'main' }}
          HEALTH_URL: ${{ secrets.HEALTH_URL || 'http://localhost:8000/health/' }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          ssh -i ~/.ssh/riskguard_deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "APP_DIR='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' HEALTH_URL='$HEALTH_URL' bash -s" \
            < scripts/deploy_pull_restart.sh
